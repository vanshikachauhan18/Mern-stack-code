<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width=device-width,initial-scale=1.0">
        <title>Counter</title>
        </head>
        <body>
            <h1>Count :</h1>
            <h1 id="Count">0 </h1>
            <button id ="incbtn" onClick="increment();">+</button>
            <button id ="decbtn" onclick="decrement();">-</button>
        </body>
        <script>
            let count = 0;
            function increment(){
                count++;
                let text = document.querySelector("#Count");
                text.innerText = count;
            }
            function decrement(){
                count--;
                let text = document.querySelector("#Count");
                text.innerText = count;
            }
        </script>
        </html>
