<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Toggle</title>
</head>
<body>
    <input type="text" id="username" placeholder="Enter your name"> <br>
    <input type="password" id="input">
    <button onclick="toggle();">Show/Hide</button> <br>

    <button onclick="submit();">Submit</button>
    <h1 id="greeting"></h1>
</body>

<script>
    function toggle(){
        let password = document.querySelector("#input");

        if(password.type == 'text'){
            password.type = "password";
        }
        else{
            password.type = "text";
        }

    }

    function submit(){
        let name = document.querySelector("#username").value;
        let heading = document.querySelector("#greeting");

        heading.innerText = "Welcome " + name ;
    }
    
</script>
</html>
